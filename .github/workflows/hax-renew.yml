name: Hax VPS Expiry Reminder

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run parser tests
        run: npm test

      - name: Check Hax VPS expiry
        run: xvfb-run -a npm run renew
        env:
          HAX_COOKIE: ${{ secrets.HAX_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REMIND_THRESHOLD_DAYS: ${{ vars.REMIND_THRESHOLD_DAYS || vars.RENEW_THRESHOLD_DAYS || '3' }}
          HAX_LOGIN_WAIT_MINUTES: ${{ vars.HAX_LOGIN_WAIT_MINUTES || '10' }}
          HAX_HEADLESS: 'false'
          HAX_STORAGE_STATE_PATH: /opt/actions-runner/.hax-browser-state.json
          TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Shanghai' }}
          HAX_INFO_URL: ${{ vars.HAX_INFO_URL || 'https://hax.co.id/vps-info' }}
